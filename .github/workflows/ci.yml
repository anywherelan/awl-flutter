name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned to match the Flutter version used by the release pipeline.
  FLUTTER_VERSION: 3.38.x

jobs:
  test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Static analysis
        # --no-fatal-infos lets pre-existing info-level deprecations (e.g.
        # dart:html in lib/server_interop/server_interop_web.dart) coexist
        # with the gate. Warnings and errors are still fatal.
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: warn

  build-web:
    name: Build web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web release
        run: flutter build web --release --no-web-resources-cdn --pwa-strategy=none --csp

      - name: Upload web build
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web
